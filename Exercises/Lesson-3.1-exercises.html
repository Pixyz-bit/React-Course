<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 3 Exercises</title>
</head>

<body>
  <div class="js-container"></div>


  <!--These are react external library-->
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <!--A specific version of react library by SuperSimpleDev-->

  <!--Babel = translates JSX into JavaScript-->
  <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!--First load the script tag-->
  <script type="text/babel"> //Then declare the type ="text/babel" to translate JSX into JS

    function CounterButtons({ count, setCount }) {
      return (
        <>
          {count === 1 ? <button onClick={() => { setCount(count + 1) }}>Clicked {count} Time</button> : <button onClick={() => { setCount(count + 1) }}>Clicked {count} Times</button>}
        </>
      )
    }
    function Buttons() {
      const [count, setCount] = React.useState(0)
      return (
        <>
          <CounterButtons
            count={count}
            setCount={setCount}
          />

          <CounterButtons
            count={count}
            setCount={setCount}
          />

          <button onClick={() => { setCount(0) }}>Reset</button>
        </>
      )
    }
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<Buttons />); //This is the function App()
  </script>
</body>

</html>
