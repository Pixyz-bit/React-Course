<!DOCTYPE html>
<html>

<head>
  <title>Chatbot</title>
</head>

<body>
  <div class="js-container"></div>


  <!--These are react external library-->
  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <!--A specific version of react library by SuperSimpleDev-->

  <!--Babel = translates JSX into JavaScript-->
  <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!--First load the script tag-->
  <script type="text/babel"> //Then declare the type ="text/babel" to translate JSX into JS
    function ChatInput() {
      return (
        <>
          <input
            placeholder="Send a message to chatbot"
            size="30" />
          <button>Send</button>
        </>
      )
    }

    function ChatMessage({ message, sender }) {
      //const message = props.message;
      //const sender = props.sender;
      //const {message, sender} = props;
      /*if (sender === 'robot') {
        return (
          <div>
            <img src="robot.png" alt="" width="50" />
            {message}
          </div>
        );
      }*/
      return (
        <div>
          {sender === 'robot' && (
            <img src="/assets/robot.png" alt="" width="50" />
          )} {/*If the left side is true, execute right; if it is false, disregard*/}
          {message} {/*render message*/}
          {sender === 'user' && (
            <img src="/assets/user.png" alt="" width="50" />
          )} {/*Left side: boolean condition; Right Side: Execute if true*/}
        </div>);
    }

    function App() { 
      return (
        <>
          {/*If there is nothing inside an element, closing tag can be removed */}
          <ChatInput />
          <ChatMessage
            message="hello chatbot"
            sender="user"
          />
          <ChatMessage
            message="Hello! How can I help you?"
            sender="robot"
          />
          <ChatMessage
            message="can you get me todays date"
            sender="user"
          />
          <ChatMessage
            message="Today is February 19"
            sender="robot"
          />
          <ChatMessage
            message="how about flip a coin"
            sender="user"
          />
          <ChatMessage
            message="Sure! You got heads"
            sender="robot"
          />
        </>
      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />); //This is the function App()
  </script>
</body>

</html>
