<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head> 
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <!--These are react external library-->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script> <!--A specific version of react library by SuperSimpleDev-->

    <!--Babel = translates JSX into JavaScript-->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!--First load the script tag-->
    <script type="text/babel"> //Then declare the type ="text/babel" to translate JSX into JS

      const button = <button>hello</button>;
      const paragraph = <p>paragraph of text</p>;

      const div = (
        <div>
          <button>hello</button>
          <p>paragraph of text {2 + 2}</p> 
        </div>
      );
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(div);
      //ReactDOM.createRoot(container).render('Welcome to SuperSimpleDev React Course'); 
      // //ReactDOM.createRoot() = sets up React; .render() = display something
    </script>
  </body>
</html>
